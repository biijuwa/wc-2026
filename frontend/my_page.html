<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Elms Sans", sans-serif;
        font-optical-sizing: auto;
      }

      .bracket-line {
        border-right: 2px solid #e2e8f0;
        border-top: 2px solid #e2e8f0;
        border-bottom: 2px solid #e2e8f0;
      }
    </style>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <div id="navbar-container"></div>
    <div id="banner-container"></div>

    <main
      class="container mx-auto max-w-[70%] p-6 grid grid-cols-1 md:grid-cols-[2fr_1fr] gap-8"
    >
      <div class="col-span-1 md:col-span-1">
        <div id="mypoints-container"></div>

        <div id="my-predictions-container"></div>
      </div>

      <div id="full-ranking-container"></div>
    </main>

    <script type="module" src="js/page.js"></script>
  </body>
</html>
