<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Elms Sans", sans-serif;
        font-optical-sizing: auto;
      }
      /* Ensure grid children do not overflow their parent */
      .grid-item-container {
        min-width: 0;
      }
    </style>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <div id="navbar-container"></div>
    <div id="banner-container"></div>

    <section
      id="dashboard-widgets"
      class="hidden container mx-auto max-w-[70%] px-4 mt-6 grid grid-cols-1 md:grid-cols-[7fr_3fr] gap-6"
    >
      <div class="flex flex-col gap-6 grid-item-container overflow-hidden">
        <div id="matchday-container"></div>
        <div id="knockout-prediction-container"></div>
      </div>

      <div class="flex flex-col gap-6 grid-item-container">
        <div id="prediction-ranking-container"></div>

        <div
          id="football-quiz-container"
          class="relative w-full"
        >
          </div>
      </div>
    </section>

    <main class="mx-auto max-w-[70%] p-6">
      <div id="login-view" class="text-center mt-20">
        <h2 class="text-4xl font-bold mb-6">Welcome to the 2026 World Cup</h2>
        <a href="http://127.0.0.1:8787/login" class="bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 transition font-bold">Sign in with Google</a>
      </div>
      <div id="dashboard-view" class="hidden">
        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>
    </main>

    <script type="module" src="/js/page.js"></script>
  </body>
</html>
