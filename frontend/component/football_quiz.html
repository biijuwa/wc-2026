<div id="quiz-container" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 font-quicksand transition-all duration-300">
  <h3 class="font-arimo font-bold text-lg mb-4 text-slate-800">Tournament Prediction Quiz</h3>
  
  <div id="collapsible-content">
    <form id="quiz-form" class="space-y-6">
      <div class="space-y-2">
        <label class="block text-sm font-arimo font-bold text-slate-700">1. Total goals by Golden Boot winner</label>
        <div class="flex flex-nowrap items-center gap-3 text-xs md:text-sm whitespace-nowrap">
          <label class="cursor-pointer"><input type="radio" name="golden_boot_goals" value="Low" required> Low (5–6)</label>
          <label class="cursor-pointer"><input type="radio" name="golden_boot_goals" value="Medium" required> Medium (7–8)</label>
          <label class="cursor-pointer"><input type="radio" name="golden_boot_goals" value="High" required> High (9+)</label>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-arimo font-bold text-slate-700">2. Total goals by tournament winner</label>
        <div class="flex flex-nowrap items-center gap-3 text-xs md:text-sm whitespace-nowrap">
          <label class="cursor-pointer"><input type="radio" name="winner_goals" value="Low" required> Low (10–14)</label>
          <label class="cursor-pointer"><input type="radio" name="winner_goals" value="Medium" required> Medium (15–18)</label>
          <label class="cursor-pointer"><input type="radio" name="winner_goals" value="High" required> High (19+)</label>
        </div>
      </div>
      
      <div class="space-y-2">
        <label class="block text-sm font-arimo font-bold text-slate-700">3. Total red cards in Knockout Stage</label>
        <div class="flex flex-nowrap items-center gap-3 text-xs md:text-sm whitespace-nowrap">
          <label class="cursor-pointer"><input type="radio" name="red_cards" value="Low" required> Low (0–5)</label>
          <label class="cursor-pointer"><input type="radio" name="red_cards" value="Medium" required> Medium (6–10)</label>
          <label class="cursor-pointer"><input type="radio" name="red_cards" value="High" required> High (11+)</label>
        </div>
      </div>
      
      <div class="space-y-2">
        <label class="block text-sm font-arimo font-bold text-slate-700">4. Total goals in Knockout Stage</label>
        <div class="flex flex-nowrap items-center gap-3 text-xs md:text-sm whitespace-nowrap">
          <label class="cursor-pointer"><input type="radio" name="knockout_goals" value="Low" required> Low (65–79)</label>
          <label class="cursor-pointer"><input type="radio" name="knockout_goals" value="Medium" required> Medium (80–94)</label>
          <label class="cursor-pointer"><input type="radio" name="knockout_goals" value="High" required> High (95+)</label>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-arimo font-bold text-slate-700">5. Total Knockout matches decided by penalties</label>
        <div class="flex flex-nowrap items-center gap-3 text-xs md:text-sm whitespace-nowrap">
          <label class="cursor-pointer"><input type="radio" name="penalties" value="Low" required> Low (0–3)</label>
          <label class="cursor-pointer"><input type="radio" name="penalties" value="Medium" required> Medium (4–7)</label>
          <label class="cursor-pointer"><input type="radio" name="penalties" value="High" required> High (8+)</label>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-arimo font-bold text-slate-700">6. Total Hat-tricks in knockout phase</label>
        <div class="flex flex-nowrap items-center gap-3 text-xs md:text-sm whitespace-nowrap">
          <label class="cursor-pointer"><input type="radio" name="hat_tricks" value="Low" required> Low (0)</label>
          <label class="cursor-pointer"><input type="radio" name="hat_tricks" value="Medium" required> Medium (1)</label>
          <label class="cursor-pointer"><input type="radio" name="hat_tricks" value="High" required> High (2+)</label>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-arimo font-bold text-slate-700">7. Total matches that go to Extra Time</label>
        <div class="flex flex-nowrap items-center gap-3 text-xs md:text-sm whitespace-nowrap">
          <label class="cursor-pointer"><input type="radio" name="extra_time_matches" value="Low" required> Low (0–3)</label>
          <label class="cursor-pointer"><input type="radio" name="extra_time_matches" value="Medium" required> Medium (4–7)</label>
          <label class="cursor-pointer"><input type="radio" name="extra_time_matches" value="High" required> High (8+)</label>
        </div>
      </div>

      <div id="status-note" class="hidden text-center p-2 bg-amber-50 text-amber-700 rounded-lg text-xs font-arimo border border-amber-200">
        Predictions submitted. You may update them for 24 hours.
      </div>
      
      <button type="submit" id="submit-btn" class="w-full bg-[#0A7C6E] text-white py-3 rounded-lg font-arimo font-bold hover:bg-[#086a5d] transition">
        Submit Predictions
      </button>
    </form>
  </div>

  <button id="view-more-btn" class="hidden w-full mt-2 py-2 border border-slate-200 rounded-lg text-xs font-arimo font-bold text-slate-500 hover:bg-slate-50 transition">
    View My Predictions
  </button>
</div>
